<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @font-face { font-family: 'Cinzel'; src: url('/fonts/cinzel-bold.woff2') format('woff2'); font-weight: 700; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1510; }
    button {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #2a2218 0%, #1a1510 50%, #2a2218 100%);
      color: #c8a84e;
      border: 1.5px solid rgba(200, 168, 78, 0.3);
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(200, 168, 78, 0.4), 0 1px 3px rgba(0,0,0,0.6);
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    button::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(200, 168, 78, 0.12), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { left: -60%; }
      100% { left: 160%; }
    }
    button:hover {
      border-color: rgba(200, 168, 78, 0.5);
      color: #f0dca0;
      text-shadow: 0 0 12px rgba(200, 168, 78, 0.6), 0 1px 3px rgba(0,0,0,0.6);
    }
  </style>
</head>
<body>
  <button id="btn">Grimoire</button>
  <script>
    const btn = document.getElementById("btn");
    let sx = 0, sy = 0, dragging = false;

    btn.addEventListener("mousedown", (e) => {
      sx = e.screenX; sy = e.screenY; dragging = false;
    });
    btn.addEventListener("mousemove", (e) => {
      if (e.buttons !== 1 || dragging) return;
      if (Math.abs(e.screenX - sx) > 8 || Math.abs(e.screenY - sy) > 8) {
        dragging = true;
        if (window.__TAURI__) {
          window.__TAURI__.window.getCurrentWindow().startDragging();
        }
      }
    });
    btn.addEventListener("click", () => {
      if (!dragging && window.__TAURI__) {
        window.__TAURI__.event.emit("grimoire_ipc", { type: "RESTORE_PANEL" });
      }
    });
  </script>
</body>
</html>
