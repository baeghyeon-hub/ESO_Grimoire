# .github/workflows/release.yml
#
# ESO 번역툴 릴리즈 자동화
# 트리거: main 브랜치 push (CI 통과 후 실행)
#
# 단계:
#   1. CI(test) 잡 통과 확인 (needs: test)
#   2. constants.py에서 APP_VERSION 읽기
#   3. 같은 태그 릴리즈가 이미 있으면 스킵
#   4. PyInstaller로 ESO_Translator.exe 빌드
#   5. GitHub Release 생성 + .exe 업로드
#
# 필요한 시크릿:
#   GITHUB_TOKEN — Actions 기본 제공, 별도 설정 불필요

name: Release

on:
  push:
    branches:
      - main

jobs:
  # ── CI 재사용 (별도 job으로 분리해 캐시 활용) ──────────────
  test:
    name: pytest (Python 3.11, Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install test dependencies
        run: pip install requests pytest pytest-timeout pyyaml
      - name: Run tests
        run: python -m pytest tests/ --timeout=30 --tb=short -q
        env:
          PYTHONPATH: .

  # ── 빌드 & 릴리즈 ──────────────────────────────────────────
  build-and-release:
    name: Build .exe & Publish Release
    needs: test                    # CI 통과 후에만 실행
    runs-on: windows-latest

    permissions:
      contents: write              # Release 생성 + 파일 업로드 권한

    steps:
      # ── 1. 코드 체크아웃 ────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python 셋업 ──────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. 버전 읽기 ────────────────────────────────────
      # constants.py의 APP_VERSION을 파싱해 환경 변수로 노출
      - name: Read APP_VERSION
        id: version
        shell: python
        run: |
          import re, os
          text = open("constants.py", encoding="utf-8").read()
          m = re.search(r'^APP_VERSION\s*=\s*["\']([^"\']+)["\']', text, re.M)
          if not m:
              raise SystemExit("constants.py에 APP_VERSION이 없습니다")
          ver = m.group(1)
          tag = f"v{ver}"
          print(f"버전: {ver}  태그: {tag}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={ver}\n")
              f.write(f"tag={tag}\n")

      # ── 4. 이미 같은 태그 릴리즈가 있으면 스킵 ─────────
      - name: Check if tag already exists
        id: tag_check
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git tag | grep -qx "$TAG"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "태그 $TAG 이미 존재 — 릴리즈 스킵"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "태그 $TAG 없음 — 릴리즈 진행"
          fi

      # ── 5. 전체 의존성 설치 (PyQt6 포함) ────────────────
      - name: Install build dependencies
        if: steps.tag_check.outputs.skip == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── 6. PyInstaller 빌드 ─────────────────────────────
      - name: Build ESO_Translator.exe
        if: steps.tag_check.outputs.skip == 'false'
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --name "ESO_Translator" `
            --add-data "eso_glossary.csv;." `
            --add-data "eso_glossary_reverse.csv;." `
            main.py
        shell: pwsh

      # ── 7. .exe 존재 확인 ───────────────────────────────
      - name: Verify .exe
        if: steps.tag_check.outputs.skip == 'false'
        shell: pwsh
        run: |
          $exe = "dist\ESO_Translator.exe"
          if (-not (Test-Path $exe)) {
            Write-Error ".exe 빌드 실패: $exe 없음"
            exit 1
          }
          $size = (Get-Item $exe).Length / 1MB
          Write-Host "빌드 성공: $exe ($([math]::Round($size,1)) MB)"

      # ── 8. GitHub Release 생성 + .exe 업로드 ────────────
      - name: Create GitHub Release
        if: steps.tag_check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.version.outputs.tag }}
          name:       "ESO 번역툴 ${{ steps.version.outputs.tag }}"
          body: |
            ## ESO 번역툴 ${{ steps.version.outputs.tag }}

            ### 설치 방법
            1. `ESO_Translator.exe` 다운로드
            2. ESO `Chat.log` 경로가 있는 폴더에서 실행
            3. DeepL API 키 입력 후 시작

            ### 변경 사항
            커밋 메시지를 참고하세요.

            ---
            *빌드: GitHub Actions (Windows / Python 3.11 / PyInstaller)*
          files: dist/ESO_Translator.exe
          draft:      false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}